name: Weekly Schedule Run

on:
  schedule:
    # 周五 12:00 / 14:00 (UTC+8)
    - cron: '0 4 * * 5'
    - cron: '0 6 * * 5'
  workflow_dispatch:

concurrency:
  group: weekly-start
  cancel-in-progress: false

jobs:
  run-start:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run task
        run: pnpm start

      - name: Commit & push (if changed)
        env:
          TZ: Asia/Shanghai
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: auto sync unity config ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push